name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        id: build
        run: |
          set -o pipefail
          cargo build --release 2>&1 | tee build.log
        shell: bash

      - name: Verify binary
        id: verify
        run: |
          BINARY=target/release/aktags
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found!"
            exit 1
          fi
          SIZE=$(stat -c%s "$BINARY")
          # Require at least 100 KB
          if [ "$SIZE" -lt 102400 ]; then
            echo "Binary size $SIZE is too small."
            exit 1
          fi
          echo "Binary size $SIZE OK."
        shell: bash

      - name: Determine next tag (main branch)
        if: ${{ github.ref == 'refs/heads/main' && success() }}
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          BASE=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
        shell: bash

      - name: Bump version in Cargo.toml
        if: ${{ steps.version.outputs.new_tag != '' }}
        run: |
          NEW_VERSION=${{ steps.version.outputs.new_tag#v }}
          sed -i -E "s/^version = \".*\"$/version = \"${NEW_VERSION}\"/" Cargo.toml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to ${NEW_VERSION}"
        shell: bash

      - name: Push tag and version bump
        if: ${{ steps.version.outputs.new_tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}
          git push origin HEAD:${{ github.ref }}
        shell: bash

      - name: Create GitHub release
        if: ${{ steps.version.outputs.new_tag != '' }}
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BINARY=target/release/aktags
          SHA256=$(sha256sum "$BINARY" | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          gh release create ${{ steps.version.outputs.new_tag }} "$BINARY" \
            --title "AkTags ${{ steps.version.outputs.new_tag }}" \
            --notes "Automated release" \
            --repo ${{ github.repository }}
        shell: bash

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aktags-${{ steps.version.outputs.new_tag }}-linux-x86_64
          path: target/release/aktags
          retention-days: 30
          if-no-files-found: error

      - name: Update Homebrew tap
        if: ${{ steps.version.outputs.new_tag != '' }}
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          set -e
          REPO="Akinus21/homebrew-tap"
          TAG="${{ steps.version.outputs.new_tag }}"
          SHA256="${{ steps.release.outputs.sha256 }}"
          git clone https://x-access-token:${TAP_TOKEN}@github.com/${REPO}.git tap-repo
          cd tap-repo
          cat > Formula/aktags.rb <<EOF
          class Aktags < Formula
            desc "AI‑driven tagging desktop application"
            homepage "https://github.com/${{ github.repository }}"
            url "https://github.com/${{ github.repository }}/releases/download/${TAG}/aktags"
            sha256 "${SHA256}"
            license "MIT"
            def install
              bin.install "aktags"
            end
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/aktags.rb
          git commit -m "aktags ${TAG}"
          git push origin main
        shell: bash

      - name: Notify webhook on success
        if: success()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          PAYLOAD=$(jq -n \
            --arg event "build_success" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg commit_msg "$(git log -1 --pretty=%B)" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{event:$event, run_url:$run_url, sha:$sha, commit_msg:$commit_msg, ref:$ref, actor:$actor}')
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          curl -fsSL -X POST "https://webhook.akinus21.com/webhook/aktags-build" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD"

      - name: Notify webhook on failure
        if: failure()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          ERRORS=$(tail -n 200 build.log || true)
          PAYLOAD=$(jq -n \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg commit_msg "$(git log -1 --pretty=%B)" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg errors "$ERRORS" \
            '{run_url:$run_url, sha:$sha, commit_msg:$commit_msg, ref:$ref, actor:$actor, errors:$errors}')
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          curl -fsSL -X POST "https://webhook.akinus21.com/webhook/aktags-build" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" || true