name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          # Use timestamp for rolling releases to ensure unique tag each time
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          COMMIT_SHA=${GITHUB_SHA:0:8}
          echo "TAG_NAME=v${VERSION}-${TIMESTAMP}-${COMMIT_SHA}" >> $GITHUB_OUTPUT

      - name: Build release
        id: build
        run: |
          set -o pipefail
          cargo build --release 2>&1 | tee build.log
        shell: bash

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Extract the first section between ### Added and the next ##
          CONTENT=$(sed -n '/## \['"$VERSION"'\]/,/## \[/p' CHANGELOG.md | sed '$d' | sed '1d')
          # Add commit info
          COMMIT_MSG=$(git log -1 --oneline --format='%s')
          CONTENT="${CONTENT}<br><br>---<br>Build: ${COMMIT_MSG} (${{ github.sha }})<br>Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CONTENT="${CONTENT//$'\\n'/<br>}"
          echo "BODY=$CONTENT" >> $GITHUB_OUTPUT

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aktags-${{ steps.version.outputs.VERSION }}-linux-x86_64
          path: target/release/aktags
          retention-days: 30

      - name: Publish release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: AkTags v${{ steps.version.outputs.VERSION }} (${{ github.sha }})
          prerelease: false
          body: ${{ steps.changelog.outputs.BODY }}
          files: target/release/aktags
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On failure: POST build log to webhook so OpenCode can fix it
      - name: Notify webhook on failure
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          ERRORS=$(cat build.log | tail -150)
          PAYLOAD=$(jq -n \
            --arg errors "$ERRORS" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            '{errors: $errors, run_url: $run_url, sha: $sha}')

          SIG=$(echo -n "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | \
            awk '{print "sha256="$2}')

          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "${{ secrets.WEBHOOK_URL }}" || true