name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxkbcommon-x11-dev \
            pkg-config \
            libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        id: build
        run: |
          set -o pipefail
          cargo build --release 2>&1 | tee build.log
        shell: bash

      - name: Verify binary
        id: verify
        run: |
          BINARY=target/release/aktags
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found!"
            exit 1
          fi
          SIZE=$(stat -c%s "$BINARY")
          # Require at least 100 KB
          if [ "$SIZE" -lt 102400 ]; then
            echo "Binary size $SIZE is too small."
            exit 1
          fi
          echo "Binary size $SIZE OK."
        shell: bash

      - name: Determine next tag (main branch)
        if: ${{ github.ref == 'refs/heads/main' && success() }}
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          BASE=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          while git tag | grep -q "^v${MAJOR}.${MINOR}.${PATCH}$"; do
            PATCH=$((PATCH + 1))
          done
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
        shell: bash

      - name: Bump version in Cargo.toml
        if: ${{ steps.version.outputs.new_tag != '' }}
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_tag }}"
          NEW_VERSION="${NEW_VERSION#v}"
          sed -i -E "s/^version = \".*\"$/version = \"${NEW_VERSION}\"/" Cargo.toml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to ${NEW_VERSION}"
        shell: bash

      - name: Push tag and version bump
        if: ${{ steps.version.outputs.new_tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}
          git push origin HEAD:${{ github.ref }}
        shell: bash

      - name: Create GitHub release
        if: ${{ steps.version.outputs.new_tag != '' }}
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BINARY=target/release/aktags
          SHA256=$(sha256sum "$BINARY" | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          gh release create ${{ steps.version.outputs.new_tag }} "$BINARY" \
            --title "AkTags ${{ steps.version.outputs.new_tag }}" \
            --notes "Automated release" \
            --repo ${{ github.repository }}
        shell: bash

      - name: Update Homebrew tap
        if: ${{ steps.version.outputs.new_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.new_tag }}
          SHA256: ${{ steps.release.outputs.sha256 }}
        run: |
          REPO="Akinus21/homebrew-tap"
          git clone https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git tap-repo
          cd tap-repo
          BINARY_URL="https://github.com/Akinus21/Aktags/releases/download/${TAG_NAME}/aktags"
          mkdir -p Formula
          cat > Formula/aktags.rb <<'RUBY'
          class Aktags < Formula
            desc "AI-powered tag-based file browser with background daemon"
            homepage "https://github.com/Akinus21/Aktags"
            version "VERSION_PLACEHOLDER"

            on_linux do
              url "URL_PLACEHOLDER"
              sha256 "SHA256_PLACEHOLDER"
            end

            def install
              bin.install "aktags"
            end

            def post_install
              (var/"aktags").mkpath
            end

            service do
              run [opt_bin/"aktags", "--daemon"]
              keep_alive true
              log_path var/"log/aktags.log"
              error_log_path var/"log/aktags.log"
            end

            test do
              system "#{bin}/aktags", "--help"
            end
          end
          RUBY
          TAG_NAME_V="${TAG_NAME#v}"
          sed -i "s/VERSION_PLACEHOLDER/${TAG_NAME_V}/g" Formula/aktags.rb
          sed -i "s|URL_PLACEHOLDER|${BINARY_URL}|g" Formula/aktags.rb
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/g" Formula/aktags.rb
          git config user.email "ci@akinus21.com"
          git config user.name "AKTags CI"
          git add Formula/aktags.rb
          git diff --cached --quiet || git commit -m "chore: update aktags to ${TAG_NAME}"
          git push https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git main
        shell: bash

      - name: Notify webhook on success
        if: success()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          PAYLOAD=$(jq -n \
            --arg event "build_success" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg commit_msg "$(git log -1 --pretty=%B)" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{event:$event, run_url:$run_url, sha:$sha, commit_msg:$commit_msg, ref:$ref, actor:$actor}')
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          curl -fsSL -X POST "https://webhook.akinus21.com/webhook/aktags-build" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD"

      - name: Notify webhook on failure
        if: failure()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          ERRORS=$(tail -n 200 build.log || true)
          PAYLOAD=$(jq -n \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg commit_msg "$(git log -1 --pretty=%B)" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg errors "$ERRORS" \
            '{run_url:$run_url, sha:$sha, commit_msg:$commit_msg, ref:$ref, actor:$actor, errors:$errors}')
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          curl -fsSL -X POST "https://webhook.akinus21.com/webhook/aktags-build" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" || true