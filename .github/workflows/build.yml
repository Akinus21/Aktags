name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        id: build
        run: cargo build --release 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: aktags-linux-x86_64
          path: target/release/aktags
          retention-days: 30

      - name: Publish rolling release
        if: steps.build.outcome == 'success' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          prerelease: true
          files: target/release/aktags
          body: |
            Automated build from ${{ github.sha }}

      # On failure: POST build log to webhook so OpenCode can fix it
      - name: Notify webhook on failure
        if: steps.build.outcome == 'failure' && github.ref == 'refs/heads/main'
        run: |
          ERRORS=$(cat build.log | tail -100)
          PAYLOAD=$(jq -n \
            --arg errors "$ERRORS" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            '{errors: $errors, run_url: $run_url, sha: $sha}')

          # Sign the payload with webhook secret
          SIG=$(echo -n "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | \
            awk '{print "sha256="$2}')

          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "${{ secrets.WEBHOOK_URL }}" || true

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1